<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luxe Realty — Find Your Dream Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES & RESET
    ═══════════════════════════════════════ */
    :root {
      /* Adjusted for better light theme readability */
      --coral:    #DE4B4B; 
      --teal:     #009B8F; 
      --gold:     #D99618; 
      --violet:   #6A4E90; 
      --bg:       #F9F6F1;
      --surface:  #FFFFFF;
      --card:     #FFFFFF;
      --text:     #121222; 
      --muted:    #525266; 
      --border:   #DCD8D2; 
      --nav-bg:   rgba(249,246,241,0.92);
      --shadow:   0 8px 40px rgba(0,0,0,0.10);
      --hero-overlay: linear-gradient(135deg, rgba(222,75,75,0.18) 0%, rgba(0,155,143,0.14) 100%);
    }
    [data-theme="dark"] {
      --bg:       #10101A;
      --surface:  #181828;
      --card:     #1E1E32;
      --text:     #F0EDE8;
      --muted:    #9A97B0;
      --border:   #2A2A42;
      --nav-bg:   rgba(16,16,26,0.94);
      --shadow:   0 8px 40px rgba(0,0,0,0.45);
      --hero-overlay: linear-gradient(135deg, rgba(255,92,92,0.28) 0%, rgba(0,194,179,0.22) 100%);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .35s, color .35s;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; width: 100%; object-fit: cover; }

    /* ═══════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: background .35s, border-color .35s;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem; font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--coral), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex; gap: 8px; list-style: none; align-items: center;
    }
    .nav-links a {
      padding: 8px 18px; border-radius: 30px;
      font-size: .92rem; font-weight: 500; color: var(--muted);
      transition: color .2s, background .2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--border);
    }
    .theme-toggle {
      width: 52px; height: 28px;
      background: linear-gradient(90deg, var(--coral), var(--teal));
      border: none; border-radius: 30px; cursor: pointer;
      position: relative; transition: opacity .2s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(24px); }
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle-label { font-size: .82rem; color: var(--muted); font-weight: 500; }

    /* ═══════════════════════════════════════
       PAGE SYSTEM
    ═══════════════════════════════════════ */
    .page { display: none; }
    .page.active { display: block; }

    /* ═══════════════════════════════════════
       HOME PAGE
    ═══════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      background:
        var(--hero-overlay),
        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600&q=80') center/cover no-repeat;
      display: flex; align-items: center; padding-top: 80px;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, var(--bg) 100%);
    }
    .hero-content {
      max-width: 1200px; margin: 0 auto; padding: 0 32px;
      position: relative; z-index: 1;
      animation: heroFadeUp .9s ease both;
    }
    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 30px; padding: 6px 16px;
      font-size: .82rem; font-weight: 600; color: var(--coral);
      margin-bottom: 24px; letter-spacing: .5px;
    }
    .hero-tag span { width: 8px; height: 8px; border-radius: 50%; background: var(--coral); display: block; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      font-weight: 900; line-height: 1.08;
      color: var(--text); max-width: 720px;
      margin-bottom: 24px;
    }
    .hero h1 em { font-style: italic; color: var(--coral); }
    .hero p {
      font-size: 1.1rem; color: var(--muted);
      max-width: 500px; line-height: 1.75;
      margin-bottom: 40px;
    }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
    .btn-primary {
      padding: 15px 36px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--coral), #FF8C42);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 6px 28px rgba(255,92,92,.38);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(255,92,92,.48); }
    .btn-secondary {
      padding: 15px 36px; border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-secondary:hover { border-color: var(--teal); background: var(--bg); }
    .hero-stats {
      display: flex; gap: 48px; margin-top: 64px; flex-wrap: wrap;
    }
    .stat-item h3 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 900; color: var(--text);
    }
    .stat-item h3 span { color: var(--coral); }
    .stat-item p { font-size: .85rem; color: var(--muted); margin-top: 2px; }

    /* SEARCH BAR */
    .search-section {
      max-width: 1200px; margin: -40px auto 80px;
      padding: 0 32px; position: relative; z-index: 2;
    }
    .search-bar {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px 32px;
      display: flex; align-items: center; gap: 16px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .search-field {
      flex: 1; min-width: 160px;
    }
    .search-field label {
      display: block; font-size: .75rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 6px;
    }
    .search-field select, .search-field input {
      width: 100%; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: .95rem;
      color: var(--text); outline: none;
      padding: 4px 0; border-bottom: 2px solid var(--border);
      transition: border-color .2s;
    }
    .search-field select:focus, .search-field input:focus { border-color: var(--teal); }
    .search-divider { width: 1px; height: 48px; background: var(--border); flex-shrink: 0; }
    .search-btn {
      padding: 14px 32px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--teal), #00A89B);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: transform .2s, box-shadow .2s; white-space: nowrap;
      box-shadow: 0 4px 18px rgba(0,194,179,.3);
    }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(0,194,179,.4); }

    /* SECTION COMMONS */
    section { max-width: 1200px; margin: 0 auto; padding: 0 32px 100px; }
    .section-label {
      font-size: .78rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 800; color: var(--text); line-height: 1.2;
      margin-bottom: 16px;
    }
    .section-sub {
      font-size: 1rem; color: var(--muted); max-width: 520px;
      line-height: 1.75; margin-bottom: 52px;
    }

    /* FEATURED LISTINGS */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .listing-card {
      background: var(--card); border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden; transition: transform .3s, box-shadow .3s;
      cursor: pointer;
    }
    .listing-card:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
    .listing-img-wrap { position: relative; height: 230px; overflow: hidden; }
    .listing-img-wrap img { height: 100%; transition: transform .4s; }
    .listing-card:hover .listing-img-wrap img { transform: scale(1.06); }
    .listing-badge {
      position: absolute; top: 16px; left: 16px;
      background: var(--coral); color: #fff;
      font-size: .72rem; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; padding: 5px 12px; border-radius: 30px;
    }
    .listing-badge.rent { background: var(--teal); }
    .listing-badge.sold { background: var(--muted); }
    .listing-fav {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: transform .2s;
    }
    .listing-fav:hover { transform: scale(1.15); }
    .listing-body { padding: 22px 24px 24px; }
    .listing-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700; color: var(--coral);
      margin-bottom: 6px;
    }
    .listing-name { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .listing-loc { font-size: .85rem; color: var(--muted); margin-bottom: 18px; display: flex; align-items: center; gap: 5px; }
    .listing-meta {
      display: flex; gap: 20px;
      border-top: 1px solid var(--border); padding-top: 16px;
    }
    .meta-item { font-size: .82rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .meta-item strong { color: var(--text); font-weight: 600; }

    /* SERVICES */
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 28px;
      transition: transform .3s, box-shadow .3s;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px; border-radius: 50%;
      opacity: .08;
    }
    .service-card:nth-child(1)::before { background: var(--coral); }
    .service-card:nth-child(2)::before { background: var(--teal); }
    .service-card:nth-child(3)::before { background: var(--gold); }
    .service-card:nth-child(4)::before { background: var(--violet); }
    .service-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .service-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 22px;
    }
    .service-card:nth-child(1) .service-icon { background: rgba(255,92,92,.12); }
    .service-card:nth-child(2) .service-icon { background: rgba(0,194,179,.12); }
    .service-card:nth-child(3) .service-icon { background: rgba(255,184,48,.12); }
    .service-card:nth-child(4) .service-icon { background: rgba(123,94,167,.12); }
    .service-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .service-card p { font-size: .88rem; color: var(--muted); line-height: 1.7; }

    /* AGENT SECTION */
    .agent-section {
      background: linear-gradient(135deg, var(--card) 0%, var(--bg) 100%);
      border-radius: 28px; border: 1px solid var(--border);
      padding: 60px; display: flex; gap: 60px; align-items: center;
      flex-wrap: wrap; margin-bottom: 0;
    }
    .agent-img-wrap {
      width: 260px; height: 320px; border-radius: 20px;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 20px 50px rgba(0,0,0,.15);
      position: relative;
    }
    .agent-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(222,75,75,.4) 100%);
    }
    .agent-img-wrap img { height: 100%; }
    .agent-info { flex: 1; min-width: 260px; }
    .agent-info .section-label { margin-bottom: 10px; }
    .agent-info h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 800; color: var(--text);
      margin-bottom: 8px;
    }
    .agent-title { color: var(--coral); font-weight: 600; font-size: .95rem; margin-bottom: 20px; }
    .agent-bio { color: var(--muted); line-height: 1.8; font-size: .95rem; margin-bottom: 28px; }
    .agent-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .agent-badge {
      padding: 7px 16px; border-radius: 30px;
      font-size: .78rem; font-weight: 600;
      border: 1px solid var(--border); color: var(--muted);
    }
    .contact-grid { display: flex; gap: 14px; flex-wrap: wrap; }
    .contact-btn {
      padding: 12px 26px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      font-weight: 600; cursor: pointer; transition: transform .2s, box-shadow .2s;
      border: none;
    }
    .contact-btn.primary {
      background: linear-gradient(135deg, var(--coral), #FF8C42);
      color: #fff; box-shadow: 0 4px 18px rgba(222,75,75,.3);
    }
    .contact-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(222,75,75,.4); }
    .contact-btn.outline {
      background: transparent; color: var(--text);
      border: 2px solid var(--border);
    }
    .contact-btn.outline:hover { border-color: var(--teal); }

    /* ═══════════════════════════════════════
       GALLERY PAGE
    ═══════════════════════════════════════ */
    .page-hero {
      min-height: 360px; padding-top: 80px;
      display: flex; align-items: center;
      background: linear-gradient(135deg,
        rgba(222,75,75,.12) 0%, rgba(0,155,143,.10) 60%, rgba(106,78,144,.08) 100%),
        var(--bg);
      position: relative; overflow: hidden;
    }
    .page-hero::before {
      content: ''; position: absolute;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,155,143,.13), transparent 70%);
      top: -200px; right: -100px; pointer-events: none;
    }
    .page-hero-content {
      max-width: 1200px; margin: 0 auto; padding: 60px 32px;
      position: relative; z-index: 1;
    }
    .page-hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900; color: var(--text); margin-bottom: 14px;
    }
    .page-hero-content p { color: var(--muted); font-size: 1rem; max-width: 480px; line-height: 1.75; }

    /* GALLERY FILTER */
    .gallery-filter {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px;
    }
    .gallery-filter .filter-btn {
      padding: 9px 22px; border-radius: 30px;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: transparent; color: var(--muted);
      transition: all .2s;
    }
    .gallery-filter .filter-btn.active, .gallery-filter .filter-btn:hover {
      background: var(--coral); border-color: var(--coral);
      color: #fff; box-shadow: 0 4px 14px rgba(222,75,75,.3);
    }

    /* GALLERY GRID */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; margin-bottom: 80px;
    }
    .gallery-item {
      border-radius: 16px; overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--card); border: 1px solid var(--border);
      aspect-ratio: 4/3;
      transition: transform .3s, box-shadow .3s;
    }
    .gallery-item.tall { aspect-ratio: 3/4; }
    .gallery-item.wide { grid-column: span 2; aspect-ratio: 16/9; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.7) 100%);
      opacity: 0; transition: opacity .3s;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 20px;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span {
      color: #fff; font-weight: 600; font-size: .95rem;
    }
    .gallery-overlay small {
      color: rgba(255,255,255,.75); font-size: .78rem; margin-top: 2px;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.88); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 90vw; max-height: 85vh;
      border-radius: 16px; object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 24px; right: 32px;
      font-size: 2rem; color: #fff; cursor: pointer;
      background: none; border: none; line-height: 1;
    }

    /* ═══════════════════════════════════════
       REVIEWS SECTION
    ═══════════════════════════════════════ */
    .reviews-bg {
      background: linear-gradient(135deg,
        rgba(222,75,75,.06) 0%, rgba(0,155,143,.06) 100%);
      padding: 80px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .reviews-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
    .reviews-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px; margin-bottom: 52px;
    }
    .review-card {
      background: var(--card); 
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .review-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .review-author { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .review-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .review-author-info h4 { font-size: 1rem; color: var(--text); margin-bottom: 2px; }
    .review-author-info span { font-size: 0.8rem; color: var(--muted); }
    .review-tex
